worker_processes auto;
# pid written to /tmp so the non-root appuser has write access
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # All temp paths moved to /tmp so nginx can write them without root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        # Port 8080 instead of 80 — non-root users cannot bind to ports below 1024
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: any path that doesn't match a real file serves index.html
        # so React Router can handle client-side navigation on direct URL access
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Strip /api/ prefix and proxy to the backend Kubernetes service.
        # The trailing slash on proxy_pass is what performs the prefix stripping.
        location /api/ {
            proxy_pass http://localhost:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
