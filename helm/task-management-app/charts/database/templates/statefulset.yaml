{{- if not .Values.external.enabled }}
# StatefulSet gives the database pod a stable identity (app-database-0) and owns
# its PersistentVolumeClaim — the volume survives pod restarts and rescheduling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "database.fullname" . }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "database.fullname" . }}-headless
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "database.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "database.selectorLabels" . | nindent 8 }}
    spec:
      # fsGroup 999 is the postgres group inside the container — ensures the mounted
      # PVC is writable by the postgres process without running as root
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          # Credentials come from the Kubernetes Secret, not baked into the image
          envFrom:
            - secretRef:
                name: {{ include "database.fullname" . }}-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              # subPath prevents postgres from complaining about a non-empty mount directory
              subPath: pgdata
            - name: init-schema
              # Postgres automatically runs any .sql files in this directory on first boot
              mountPath: /docker-entrypoint-initdb.d
          # pg_isready is the correct health check for Postgres — checks the DB is accepting connections
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: init-schema
          configMap:
            name: {{ include "database.fullname" . }}-init
  # volumeClaimTemplates binds a PVC to this StatefulSet — the volume outlives the pod
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
{{- end }}
