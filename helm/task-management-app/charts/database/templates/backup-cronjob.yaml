apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "database.fullname" . }}-backup
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - /bin/sh
                - -c
                - |
                  BACKUP_FILE="/backups/backup-$(date +%Y%m%d-%H%M%S).sql"
                  pg_dump -h postgres-service -U $POSTGRES_USER -d $POSTGRES_DB > "$BACKUP_FILE"
                  echo "Backup saved to $BACKUP_FILE"
                  find /backups -name "*.sql" -mtime +{{ .Values.backup.retentionDays }} -delete
                  echo "Old backups pruned (retention: {{ .Values.backup.retentionDays }} days)"
              envFrom:
                - secretRef:
                    name: {{ include "database.fullname" . }}-secret
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ include "database.fullname" . }}-backups
