apiVersion: v1
kind: Service
metadata:
  name: {{ include "database.fullname" . }}-headless
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "database.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
