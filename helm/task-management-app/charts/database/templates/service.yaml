apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "database.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
