database:
  # Local mode (Minikube): external.enabled: false  → deploys StatefulSet + PVC inside the cluster
  # Production mode (AWS RDS etc): external.enabled: true, set host to your RDS endpoint
  #   e.g. host: mydb.xxxxxxxx.us-east-1.rds.amazonaws.com
  external:
    enabled: false
    host: ""
    port: 5432

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    database: taskmanagement
    username: postgres
    password: changeme

  storage:
    size: 1Gi
    storageClass: standard

  backup:
    schedule: "0 2 * * *"
    retentionDays: 7
    storage:
      size: 5Gi
      storageClass: standard

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  pdb:
    minAvailable: 1
